version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: hermes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
      POSTGRES_DB: hermes_db
    ports:
      - "5432:5432"
    volumes:
      - hermes_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hermes-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://hermes:hermes@postgres:5432/hermes_db
      ENGINE_GRPC_HOST: engine
      ENGINE_GRPC_PORT: "50051"
    depends_on:
      postgres:
        condition: service_healthy
      engine:
        condition: service_started
    networks:
      - hermes-net

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: hermes-engine
    restart: unless-stopped
    ports:
      - "50051:50051"   # gRPC
      - "9090:9090"     # Prometheus metrics
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=hermes_db;Username=hermes;Password=hermes"
      Grpc__Port: "50051"
      Metrics__PrometheusPort: "9090"
    networks:
      - hermes-net

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: hermes-webapp
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./webapp:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    networks:
      - hermes-net

volumes:
  hermes_pgdata:

networks:
  hermes-net:
    driver: bridge
