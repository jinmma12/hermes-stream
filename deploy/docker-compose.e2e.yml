version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: hermes-e2e-postgres
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
      POSTGRES_DB: hermes_e2e
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes_e2e"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: hermes-e2e-zookeeper
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "22181:2181"

  kafka:
    image: bitnami/kafka:3.7
    container_name: hermes-e2e-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    ports:
      - "29092:9092"

  ftp:
    image: bogem/ftp
    container_name: hermes-e2e-ftp
    environment:
      FTP_USER: hermes
      FTP_PASS: hermes
    ports:
      - "2121:21"
      - "47400-47409:47400-47409"

  sftp:
    image: atmoz/sftp:alpine
    container_name: hermes-e2e-sftp
    command: hermes:hermes:1001:::upload
    ports:
      - "2222:22"

  minio:
    image: minio/minio:latest
    container_name: hermes-e2e-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hermes
      MINIO_ROOT_PASSWORD: hermes123
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hermes-e2e-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://hermes:hermes@postgres:5432/hermes_e2e
      ENGINE_GRPC_HOST: engine
      ENGINE_GRPC_PORT: "50051"
    ports:
      - "18000:8000"

  engine:
    build:
      context: ../engine
      dockerfile: Dockerfile
    container_name: hermes-e2e-engine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Database=hermes_e2e;Username=hermes;Password=hermes
      Grpc__Port: "50051"
      Metrics__PrometheusPort: "9090"
    ports:
      - "15051:50051"
      - "19090:9090"
