apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-engine
  labels:
    app.kubernetes.io/name: hermes-engine
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount.engine }}
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-engine
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-engine
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.engine.metricsPort }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: engine
          image: "{{ .Values.image.engine.repository }}:{{ .Values.image.engine.tag }}"
          imagePullPolicy: {{ .Values.image.engine.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.engine.grpcPort }}
            - name: metrics
              containerPort: {{ .Values.service.engine.metricsPort }}
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "Host={{ if .Values.postgresql.enabled }}{{ .Release.Name }}-postgresql{{ else }}{{ .Values.database.external.host }}{{ end }};Database={{ .Values.postgresql.auth.database }};Username={{ .Values.postgresql.auth.username }};Password={{ .Values.postgresql.auth.password }}"
            - name: Grpc__Port
              value: "{{ .Values.service.engine.grpcPort }}"
            - name: Metrics__PrometheusPort
              value: "{{ .Values.service.engine.metricsPort }}"
            - name: Engine__ProcessingConcurrency
              value: "{{ .Values.engine.processingConcurrency }}"
            - name: Engine__PluginTimeoutSeconds
              value: "{{ .Values.engine.pluginTimeoutSeconds }}"
            - name: Database__Provider
              value: "{{ .Values.database.provider }}"
            - name: Jwt__Secret
              value: "{{ .Values.jwt.secret }}"
          resources:
            {{- toYaml .Values.resources.engine | nindent 12 }}
          readinessProbe:
            grpc:
              port: {{ .Values.service.engine.grpcPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: {{ .Values.service.engine.metricsPort }}
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: content-repo
              mountPath: /var/hermes/content-repo
      volumes:
        - name: content-repo
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-content-repo
