apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app.kubernetes.io/name: hermes-api
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-api
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.api.port }}
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ if .Values.postgresql.enabled }}{{ .Release.Name }}-postgresql{{ else }}{{ .Values.database.external.host }}{{ end }}:5432/{{ .Values.postgresql.auth.database }}"
            - name: ENGINE_GRPC_HOST
              value: "{{ .Release.Name }}-engine"
            - name: ENGINE_GRPC_PORT
              value: "{{ .Values.service.engine.grpcPort }}"
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/v1/system/health
              port: {{ .Values.service.api.port }}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/system/health
              port: {{ .Values.service.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
